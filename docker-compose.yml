version: '3.8'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - uno-net

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/uno-online
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CLIENT_URL: http://localhost
      NODE_ENV: production
    depends_on:
      - mongo
    networks:
      - uno-net

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    networks:
      - uno-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client
    networks:
      - uno-net

volumes:
  mongo_data:

networks:
  uno-net:
    driver: bridge
